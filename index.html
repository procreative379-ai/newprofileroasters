<style>/* ============ PROFILE COFFEE — design tokens ============ */
:root {
  --bg: #ECE2CD;
  --bg-2: #F4ECD8;
  --paper: #FAF3E1;
  --ink: #1B1410;
  --ink-2: #3D2E22;
  --muted: #87705A;
  --line: #C8B89A;
  --line-soft: #D9C9AB;
  --accent: #B23A28;
  --accent-2: #8A2C1F;
  --accent-ink: #FAF3E1;
  --ok: #4F6B3B;

  --font-sans: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --font-display: 'Space Grotesk', ui-sans-serif, sans-serif;

  --r-sm: 4px;
  --r-md: 8px;
  --r-lg: 14px;

  --pad-x: clamp(20px, 4vw, 56px);
}

[data-theme="dark"] {
  --bg: #161210;
  --bg-2: #1F1A15;
  --paper: #221C16;
  --ink: #EFE3CB;
  --ink-2: #C9BBA0;
  --muted: #8B7A60;
  --line: #3A2F25;
  --line-soft: #2B231C;
  --accent: #D55742;
  --accent-2: #E27059;
  --accent-ink: #1B1410;
}

/* ===== Forest palette (Fauno-inspired) — переключается в Tweaks ===== */
[data-palette="forest"] {
  --bg: #E5E0CE;
  --bg-2: #EDE8D6;
  --paper: #F2ECDA;
  --ink: #1A2A20;
  --ink-2: #36473A;
  --muted: #6F7A63;
  --line: #B9C0A4;
  --line-soft: #CCCFB5;
  --accent: #3E5E45;
  --accent-2: #2B4631;
  --accent-ink: #F2ECDA;
  --green: #3E5E45;
  --honey: #B98C4A;
}
[data-palette="forest"][data-theme="dark"] {
  --bg: #121711;
  --bg-2: #1A2117;
  --paper: #1E261B;
  --ink: #E8E3CE;
  --ink-2: #C0C4A6;
  --muted: #828C6D;
  --line: #2D3829;
  --line-soft: #222B1F;
  --accent: #6E9466;
  --accent-2: #88AC7B;
  --accent-ink: #121711;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "ss02";
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
img { display: block; max-width: 100%; }

.mono { font-family: var(--font-mono); font-feature-settings: "ss01"; }
.upper { text-transform: uppercase; letter-spacing: 0.04em; }
.tabular { font-variant-numeric: tabular-nums; }

/* ============ App shell ============ */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ============ Header ============ */
.nav {
  position: sticky;
  top: 0;
  z-index: 40;
  background: var(--bg);
  border-bottom: 1px solid var(--line-soft);
}
.nav-inner {
  display: flex;
  align-items: center;
  gap: 32px;
  padding: 14px var(--pad-x);
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.01em;
}
.nav-logo img { width: 36px; height: 36px; object-fit: contain; }
[data-theme="dark"] .nav-logo img { filter: invert(1); }
.nav-logo small {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  display: block;
  margin-top: 2px;
  text-transform: uppercase;
}
.nav-links {
  display: flex;
  gap: 22px;
  flex: 1;
  margin-left: 14px;
}
.nav-link {
  font-size: 14px;
  color: var(--ink-2);
  padding: 4px 0;
  border-bottom: 1px solid transparent;
  transition: color .15s, border-color .15s;
}
.nav-link:hover { color: var(--ink); }
.nav-link.is-active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-actions { display: flex; align-items: center; gap: 8px; }
.nav-btn {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--ink);
  padding: 8px 12px;
  border-radius: var(--r-md);
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.nav-btn:hover { background: var(--paper); }
.nav-cart-count {
  background: var(--accent);
  color: var(--accent-ink);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 999px;
  min-width: 18px;
  text-align: center;
}

/* ============ Buttons ============ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  padding: 12px 18px;
  border-radius: var(--r-md);
  border: 1px solid transparent;
  transition: transform .08s ease, background .15s, color .15s;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--accent); color: var(--accent-ink); }
.btn-primary:hover { background: var(--accent-2); }
.btn-ghost { background: transparent; border-color: var(--line); color: var(--ink); }
.btn-ghost:hover { background: var(--paper); }
.btn-ink { background: var(--ink); color: var(--bg); }
.btn-ink:hover { background: var(--ink-2); }
.btn-lg { padding: 16px 22px; font-size: 15px; }
.btn-sm { padding: 8px 12px; font-size: 13px; }

/* ============ Generic layout ============ */
.section {
  padding: 80px var(--pad-x);
  border-top: 1px solid var(--line-soft);
}
.section.tight { padding-top: 48px; padding-bottom: 48px; }
.section h2.eyebrow,
.eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin: 0 0 18px;
}
.section h2 { font-weight: 600; }
.h1 { font-size: clamp(40px, 6vw, 88px); line-height: 0.95; letter-spacing: -0.02em; font-weight: 600; margin: 0; }
.h2 { font-size: clamp(28px, 3.6vw, 48px); line-height: 1.05; letter-spacing: -0.015em; font-weight: 600; margin: 0; }
.h3 { font-size: clamp(20px, 1.8vw, 24px); font-weight: 600; margin: 0; }
.lede { font-size: clamp(16px, 1.4vw, 19px); color: var(--ink-2); max-width: 60ch; }

/* ============ Hero variants ============ */
/* Variant A — massive typography on terracotta */
.heroA {
  background: var(--accent);
  color: var(--accent-ink);
  padding: 56px var(--pad-x) 24px;
  position: relative;
  overflow: hidden;
}
.heroA .meta-row {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.7;
  margin-bottom: 24px;
}
.heroA .big {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(64px, 18vw, 280px);
  line-height: 0.82;
  letter-spacing: -0.04em;
  margin: 0;
}
.heroA .big .accent-italic { font-style: italic; font-weight: 500; }
.heroA .bottom {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr;
  gap: 32px;
  padding-top: 32px;
  margin-top: 32px;
  border-top: 1px solid rgba(250, 243, 225, 0.25);
  align-items: end;
}
.heroA .bottom p { margin: 0; font-size: 15px; line-height: 1.5; max-width: 42ch; }
.heroA .bottom .col-data { font-family: var(--font-mono); font-size: 12px; line-height: 1.7; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.06em; }
.heroA .bottom .col-data b { font-family: var(--font-sans); font-size: 14px; opacity: 1; letter-spacing: 0; text-transform: none; display: block; margin-top: 2px; font-weight: 500; }

/* Variant B — featured bag */
.heroB {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  min-height: 78vh;
  border-bottom: 1px solid var(--line-soft);
}
.heroB-left {
  padding: 64px var(--pad-x);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.heroB-left .title { font-family: var(--font-display); font-size: clamp(40px, 5vw, 72px); line-height: 1; letter-spacing: -0.02em; font-weight: 600; margin: 24px 0 0;}
.heroB-left .title em { font-style: italic; color: var(--accent); }
.heroB-left .bottom { display: flex; gap: 20px; align-items: center; }
.heroB-right {
  background: var(--accent);
  color: var(--accent-ink);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  overflow: hidden;
}
.heroB-right .specs {
  position: absolute;
  top: 24px; left: 24px; right: 24px;
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.85;
}
.heroB-right .specs-bot {
  position: absolute;
  bottom: 24px; left: 24px; right: 24px;
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.85;
}
.bag {
  width: min(360px, 70%);
  aspect-ratio: 3/4;
  background: var(--paper);
  color: var(--ink);
  border-radius: 4px 4px 22px 22px;
  padding: 26px 22px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-shadow: 0 30px 60px -20px rgba(0,0,0,0.4);
  position: relative;
}
.bag::before {
  content:"";
  position: absolute;
  top: -8px; left: 18%; right: 18%;
  height: 16px;
  background: var(--ink);
  border-radius: 4px 4px 2px 2px;
}
.bag-top { display: flex; flex-direction: column; gap: 4px; }
.bag-top .b-no { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.bag-top .b-name { font-family: var(--font-display); font-size: 28px; line-height: 1; font-weight: 600; }
.bag-top .b-origin { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;}
.bag-mid { display: flex; flex-direction: column; gap: 6px; }
.bag-mid .note { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-2); border-top: 1px dashed var(--line); padding-top: 6px;}
.bag-bot { font-family: var(--font-mono); font-size: 10px; line-height: 1.6; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
.bag-bot b { display: block; color: var(--ink); font-family: var(--font-sans); font-size: 13px; font-weight: 500; letter-spacing: 0; text-transform: none;}

/* Variant C — manifesto rail */
.heroC { padding: 0; }
.heroC-row {
  display: grid;
  grid-template-columns: 220px 1fr;
  align-items: center;
  padding: 28px var(--pad-x);
  border-bottom: 1px solid var(--line-soft);
  min-height: 200px;
}
.heroC-row .mono-tag { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
.heroC-row .text { font-family: var(--font-display); font-size: clamp(28px, 4.5vw, 64px); line-height: 1; letter-spacing: -0.02em; font-weight: 600; }
.heroC-row.dark { background: var(--ink); color: var(--bg); }
.heroC-row.dark .mono-tag { color: rgba(236, 226, 205, 0.6); }
.heroC-row.accent { background: var(--accent); color: var(--accent-ink);}
.heroC-row.accent .mono-tag { color: rgba(250, 243, 225, 0.7); }
.heroC-row em { font-style: italic; }

/* ============ Marquee strip ============ */
.strip {
  background: var(--ink);
  color: var(--bg);
  padding: 18px 0;
  overflow: hidden;
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.strip-track { display: flex; gap: 48px; white-space: nowrap; animation: strip 40s linear infinite; }
.strip-track span { display: inline-flex; align-items: center; gap: 14px; }
.strip-track span::after { content: "✦"; color: var(--accent); }
@keyframes strip { from { transform: translateX(0); } to { transform: translateX(-50%); }}

/* ============ Catalog grid ============ */
.catalog {
  padding: 32px var(--pad-x) 80px;
}
.catalog-head {
  display: flex;
  justify-content: space-between;
  align-items: end;
  flex-wrap: wrap;
  gap: 24px;
  padding-bottom: 24px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--line-soft);
}
.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 6px 12px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: transparent;
  color: var(--ink-2);
}
.filter.is-active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}
.card {
  background: var(--paper);
  border: 1px solid var(--line-soft);
  border-radius: var(--r-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform .15s, box-shadow .2s;
  cursor: pointer;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 28px -16px rgba(0,0,0,0.25);
}
.card-thumb {
  aspect-ratio: 4/5;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card-thumb.tone-2 { background: linear-gradient(135deg, #2D5F4F 0%, #1B4034 100%); }
.card-thumb.tone-3 { background: linear-gradient(135deg, #C99553 0%, #8E6125 100%); }
.card-thumb.tone-4 { background: linear-gradient(135deg, #2A2018 0%, #5C4632 100%); }
.card-thumb.tone-5 { background: linear-gradient(135deg, #6A4E7A 0%, #432F50 100%); }
.card-thumb.tone-6 { background: linear-gradient(135deg, #4B5E92 0%, #2E3F66 100%); }
.card-thumb .bag-mini {
  width: 70%;
  aspect-ratio: 3/4;
  background: var(--paper);
  color: var(--ink);
  border-radius: 2px 2px 14px 14px;
  padding: 16px 14px;
  font-family: var(--font-mono);
  font-size: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  position: relative;
  box-shadow: 0 12px 24px -10px rgba(0,0,0,0.4);
}
.card-thumb .bag-mini::before {
  content: "";
  position: absolute;
  top: -5px; left: 18%; right: 18%;
  height: 10px;
  background: var(--ink);
  border-radius: 3px 3px 2px 2px;
}
.card-thumb .bag-mini .b-name {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;
  text-transform: none;
  line-height: 1;
  margin-top: 4px;
}
.card-thumb .bag-mini .b-no { color: var(--muted); }
.card-meta {
  padding: 16px 18px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card-meta .row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 12px;}
.card-meta .name { font-family: var(--font-display); font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }
.card-meta .price { font-family: var(--font-mono); font-size: 14px; }
.card-meta .origin { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;}
.card-meta .notes { font-size: 13px; color: var(--ink-2); }
.card-meta .add {
  margin-top: 6px;
  border: 1px solid var(--ink);
  background: transparent;
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 8px 10px;
  border-radius: var(--r-md);
}
.card-meta .add:hover { background: var(--ink); color: var(--bg); }
.card-meta .add.added { background: var(--ok); border-color: var(--ok); color: white; }

/* ============ Product page ============ */
.pdp { display: grid; grid-template-columns: 1.1fr 1fr; gap: 0; min-height: 80vh; border-bottom: 1px solid var(--line-soft);}
.pdp-image {
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  padding: 60px;
  min-height: 600px;
  position: relative;
}
.pdp-image .bag { width: min(380px, 80%); }
.pdp-image .label-top, .pdp-image .label-bot {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(250,243,225,0.85);
}
.pdp-image .label-top { top: 24px; left: 24px;}
.pdp-image .label-top.r { left: auto; right: 24px;}
.pdp-image .label-bot { bottom: 24px; left: 24px; }
.pdp-image .label-bot.r { left: auto; right: 24px;}

.pdp-info { padding: 60px var(--pad-x); display: flex; flex-direction: column; gap: 32px;}
.pdp-info .crumb { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);}
.pdp-info h1 { font-family: var(--font-display); font-size: clamp(40px, 5vw, 68px); line-height: 0.95; letter-spacing: -0.02em; font-weight: 600; margin: 0;}
.pdp-info h1 em { font-style: italic; color: var(--accent);}
.pdp-info .price-row { display: flex; gap: 18px; align-items: baseline; padding: 18px 0; border-top: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft);}
.pdp-info .price-row .price { font-family: var(--font-display); font-size: 34px; font-weight: 600; }
.pdp-info .price-row small { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;}
.opt-group { display: flex; flex-direction: column; gap: 10px; }
.opt-group .lbl { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);}
.opts { display: flex; gap: 6px; flex-wrap: wrap;}
.opt {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 12px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--ink);
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.opt.is-active { background: var(--ink); color: var(--bg); border-color: var(--ink);}

.profile-chart {
  display: grid;
  grid-template-columns: 100px 1fr 40px;
  gap: 10px 12px;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.profile-chart .bar {
  height: 8px;
  background: var(--line-soft);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.profile-chart .bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
}
.profile-chart .val { font-family: var(--font-mono); text-align: right;}

.pdp-spec-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 12px;
}
.pdp-spec-table td {
  padding: 12px 0;
  border-bottom: 1px solid var(--line-soft);
  vertical-align: top;
}
.pdp-spec-table td:first-child { color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; width: 40%; }
.pdp-spec-table td:last-child { color: var(--ink); }

/* ============ Cart drawer ============ */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(20, 16, 12, 0.4);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.drawer-overlay.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed;
  top: 0; right: 0;
  height: 100vh;
  width: min(460px, 96vw);
  background: var(--bg);
  z-index: 100;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform .25s ease;
  border-left: 1px solid var(--line);
}
.drawer.open { transform: translateX(0); }
.drawer-head { padding: 20px 24px; border-bottom: 1px solid var(--line-soft); display: flex; justify-content: space-between; align-items: center;}
.drawer-head h3 { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin: 0;}
.drawer-close { background: transparent; border: none; color: var(--ink); font-size: 22px; cursor: pointer;}
.drawer-body { flex: 1; overflow-y: auto; padding: 16px 24px;}
.drawer-body .empty { color: var(--muted); font-family: var(--font-mono); font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; padding: 60px 0; text-align: center;}
.cart-line {
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: 14px;
  padding: 16px 0;
  border-bottom: 1px solid var(--line-soft);
}
.cart-line .thumb {
  aspect-ratio: 3/4;
  background: var(--accent);
  border-radius: 4px;
}
.cart-line .nm { font-family: var(--font-display); font-size: 16px; font-weight: 600;}
.cart-line .sub { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;}
.cart-line .qty { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.cart-line .qty button { width: 24px; height: 24px; border: 1px solid var(--line); background: transparent; color: var(--ink); border-radius: 4px;}
.cart-line .qty span { font-family: var(--font-mono); font-size: 13px; min-width: 18px; text-align: center;}
.cart-line .price { font-family: var(--font-mono); font-size: 13px; align-self: start;}
.cart-line .rm { background: none; border: none; color: var(--muted); font-family: var(--font-mono); font-size: 11px; text-decoration: underline; padding: 0; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.06em;}
.drawer-foot { padding: 20px 24px; border-top: 1px solid var(--line-soft); display: flex; flex-direction: column; gap: 12px;}
.drawer-foot .total { display: flex; justify-content: space-between; font-family: var(--font-display); font-size: 22px; font-weight: 600;}

/* ============ Subscription ============ */
.sub-plans { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 24px;}
.sub-plan {
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 28px;
  background: var(--paper);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.sub-plan.feat { background: var(--ink); color: var(--bg); border-color: var(--ink);}
.sub-plan.feat .muted, .sub-plan.feat li { color: var(--bg);}
.sub-plan .frq { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);}
.sub-plan .nm { font-family: var(--font-display); font-size: 32px; font-weight: 600; line-height: 1;}
.sub-plan .pr { font-family: var(--font-mono); font-size: 14px;}
.sub-plan ul { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 6px; font-size: 14px; color: var(--ink-2);}
.sub-plan li::before { content: "→ "; color: var(--accent); font-family: var(--font-mono);}
.sub-plan.feat li::before { color: var(--accent-2);}

/* ============ Wholesale ============ */
.split { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
.split.thirds { grid-template-columns: repeat(3, 1fr); }
.fact { border-top: 1px solid var(--line-soft); padding-top: 14px;}
.fact .big-num { font-family: var(--font-display); font-size: clamp(36px, 4vw, 56px); font-weight: 600; line-height: 1;}
.fact .lbl { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-top: 6px;}

/* ============ About story ============ */
.story-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start;}
.timeline { display: flex; flex-direction: column; gap: 20px;}
.timeline-item {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--line-soft);
}
.timeline-item .y { font-family: var(--font-mono); font-size: 14px; color: var(--accent);}
.timeline-item .ev { font-size: 15px; color: var(--ink); }
.timeline-item .ev b { font-family: var(--font-display); display: block; font-size: 18px; margin-bottom: 4px; font-weight: 600;}

.team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.team-card { display: flex; flex-direction: column; gap: 10px;}
.team-card .ph {
  aspect-ratio: 4/5;
  background: var(--paper);
  border: 1px solid var(--line-soft);
  border-radius: var(--r-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  position: relative;
  overflow: hidden;
}
.team-card .ph::after {
  content: "";
  position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent 0 12px, var(--line-soft) 12px 13px);
  opacity: 0.5;
}
.team-card .ph span { position: relative; z-index: 1; background: var(--bg-2); padding: 4px 8px; border-radius: 4px;}
.team-card .nm { font-family: var(--font-display); font-size: 18px; font-weight: 600;}
.team-card .role { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.08em;}

/* ============ Contacts ============ */
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px;}
.contact-card { padding: 28px; border: 1px solid var(--line-soft); border-radius: var(--r-lg); background: var(--paper);}
.contact-card h3 { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin: 0 0 14px;}
.contact-card .line { font-family: var(--font-mono); font-size: 13px; padding: 6px 0; color: var(--ink-2); }
.contact-card .line b { display: block; font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; font-weight: 500;}
.map-placeholder {
  margin-top: 24px;
  aspect-ratio: 16/7;
  background:
    linear-gradient(var(--accent), var(--accent)) center/2px 100% no-repeat,
    repeating-linear-gradient(0deg, transparent 0 60px, var(--line-soft) 60px 61px),
    repeating-linear-gradient(90deg, transparent 0 60px, var(--line-soft) 60px 61px),
    var(--paper);
  border-radius: var(--r-lg);
  border: 1px solid var(--line-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  position: relative;
}
.map-pin {
  position: absolute;
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 50%;
  border: 3px solid var(--paper);
  box-shadow: 0 0 0 1px var(--accent);
}

.map-card {
  display: block;
  margin-top: 24px;
  border-radius: var(--r-lg);
  border: 1px solid var(--line-soft);
  background: var(--paper);
  overflow: hidden;
  position: relative;
  text-decoration: none;
  color: inherit;
  transition: transform .15s ease, box-shadow .2s ease, border-color .15s;
}
.map-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 18px 36px -18px rgba(0,0,0,0.25);
}
.map-card:hover .map-cta { background: var(--accent); color: var(--accent-ink); }
.map-canvas {
  aspect-ratio: 16/7;
  position: relative;
  color: var(--ink-2);
}
.map-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.map-pin-wrap {
  position: absolute;
  top: 50%; left: 38%;
  transform: translate(-50%, -100%);
}
.map-pin-dot {
  position: relative;
  width: 18px; height: 18px;
  background: var(--accent);
  border-radius: 50%;
  border: 4px solid var(--paper);
  box-shadow: 0 0 0 1px var(--accent), 0 8px 16px -4px rgba(0,0,0,0.25);
  margin: 0 auto;
}
.map-pin-pulse {
  position: absolute;
  top: 9px; left: 50%;
  width: 18px; height: 18px;
  background: var(--accent);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0.45;
  animation: pulse 2s ease-out infinite;
  pointer-events: none;
}
@keyframes pulse {
  0% { opacity: 0.45; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(3.5); }
}
.map-pin-label {
  position: absolute;
  left: 50%;
  bottom: calc(100% + 10px);
  transform: translateX(-50%);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 10px 14px;
  white-space: nowrap;
  box-shadow: 0 8px 24px -8px rgba(0,0,0,0.18);
}
.map-pin-label::after {
  content: "";
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 6px solid var(--line);
}
.map-cta {
  position: absolute;
  right: 16px; bottom: 16px;
  background: var(--ink);
  color: var(--bg);
  padding: 10px 14px;
  border-radius: var(--r-md);
  display: inline-flex;
  align-items: center;
  gap: 10px;
  transition: background .15s, color .15s;
}

/* ============ Blog ============ */
.posts { display: grid; grid-template-columns: 1fr 1fr; gap: 36px; }
.post {
  display: flex; flex-direction: column; gap: 16px;
  border-top: 1px solid var(--line-soft);
  padding-top: 24px;
}
.post .cover {
  aspect-ratio: 16/10;
  background: var(--accent);
  border-radius: var(--r-md);
  position: relative;
  overflow: hidden;
}
.post .cover.alt-1 { background: var(--ink);}
.post .cover.alt-2 { background: linear-gradient(135deg, #C99553, #8E6125);}
.post .cover.alt-3 { background: linear-gradient(135deg, #2D5F4F, #1B4034);}
.post .cover .swatch {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.9);
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.post .tag { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; color: var(--accent); letter-spacing: 0.08em;}
.post .tt { font-family: var(--font-display); font-size: 24px; font-weight: 600; line-height: 1.15; letter-spacing: -0.01em;}
.post .meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;}

/* ============ Courses ============ */
.courses { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;}
.course {
  border: 1px solid var(--line);
  padding: 24px;
  border-radius: var(--r-lg);
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: var(--paper);
}
.course .lvl { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent);}
.course .nm { font-family: var(--font-display); font-size: 24px; font-weight: 600; line-height: 1.1;}
.course .row { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;}
.course p { margin: 0; color: var(--ink-2); font-size: 14px;}
.course .price { font-family: var(--font-display); font-size: 22px; font-weight: 600;}

/* ============ Checkout ============ */
.checkout { display: grid; grid-template-columns: 1.4fr 1fr; gap: 48px; align-items: start;}
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px;}
.field label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);}
.field input, .field textarea {
  font-family: var(--font-sans);
  font-size: 14px;
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 12px;
  border-radius: var(--r-md);
  color: var(--ink);
}
.field input:focus, .field textarea:focus { outline: none; border-color: var(--accent);}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px;}
.summary-box {
  background: var(--paper);
  border: 1px solid var(--line-soft);
  border-radius: var(--r-lg);
  padding: 28px;
  position: sticky;
  top: 100px;
}
.summary-box h3 { font-family: var(--font-display); font-size: 20px; font-weight: 600; margin: 0 0 14px;}
.summary-box .row { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 13px; padding: 6px 0;}
.summary-box .total { font-family: var(--font-display); font-size: 24px; font-weight: 600; border-top: 1px solid var(--line); padding-top: 14px; margin-top: 14px; display: flex; justify-content: space-between;}

.success {
  text-align: center;
  padding: 100px 40px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  align-items: center;
}
.success .check {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--accent); color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
}

/* ============ Footer ============ */
.footer {
  margin-top: auto;
  padding: 60px var(--pad-x) 24px;
  background: var(--ink);
  color: var(--bg);
}
.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 48px;
  padding-bottom: 48px;
  border-bottom: 1px solid rgba(236, 226, 205, 0.15);
}
.footer-grid h4 { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(236,226,205,0.6); margin: 0 0 14px; font-weight: 500;}
.footer-grid a { display: block; padding: 4px 0; font-size: 14px;}
.footer-grid a:hover { color: var(--accent-2);}
.footer-big { font-family: var(--font-display); font-size: clamp(48px, 6vw, 88px); line-height: 0.9; letter-spacing: -0.02em; font-weight: 600; padding: 32px 0 8px;}
.footer-bottom { padding-top: 16px; display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(236,226,205,0.5);}

/* ============ Toast ============ */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: var(--bg);
  padding: 12px 20px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0;
  pointer-events: none;
  transition: all .2s;
  z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0);}

.mp-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.mp-card {
  display: grid;
  grid-template-columns: 80px 1fr 24px;
  align-items: center;
  gap: 18px;
  padding: 22px 24px;
  background: var(--paper);
  border: 1px solid var(--line-soft);
  border-radius: var(--r-lg);
  text-decoration: none;
  color: inherit;
  transition: transform .12s, border-color .15s, box-shadow .2s;
}
.mp-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 16px 32px -16px rgba(0,0,0,0.18);
}
.mp-card:hover .mp-arrow { color: var(--accent);}
.mp-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 64px; height: 64px;
  background: var(--ink);
  color: var(--bg);
  border-radius: var(--r-md);
  font-family: var(--font-mono);
  font-size: 19px;
  font-weight: 500;
  letter-spacing: 0;
}
.mp-info .mp-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: -0.01em;}
.mp-info .mp-sub { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px;}
.mp-arrow { font-family: var(--font-mono); font-size: 20px; color: var(--muted); transition: color .15s;}

@media (max-width: 900px) {
  .mp-grid { grid-template-columns: 1fr; gap: 10px;}
  .mp-card { padding: 16px 18px; grid-template-columns: 56px 1fr 20px; gap: 14px;}
  .mp-logo { width: 48px; height: 48px; font-size: 15px;}
  .mp-info .mp-title { font-size: 15px;}
}

/* ============ Hero — full-bleed photo (Fauno-style) ============ */
.heroPhoto {
  position: relative;
  height: min(88vh, 860px);
  min-height: 560px;
  overflow: hidden;
  border-bottom: 1px solid var(--line-soft);
  background: var(--accent);
}
.hero-photo-slot {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}
.hero-scrim {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgba(20,16,12,0.32) 0%, rgba(20,16,12,0) 30%),
    linear-gradient(0deg, rgba(20,16,12,0.62) 0%, rgba(20,16,12,0.12) 38%, rgba(20,16,12,0) 60%);
  z-index: 1;
}
.hero-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 2;
  display: flex;
  justify-content: space-between;
  padding: 28px var(--pad-x);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(250,243,225,0.85);
  pointer-events: none;
  text-shadow: 0 1px 8px rgba(0,0,0,0.4);
}
.hero-content {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  z-index: 2;
  padding: 0 var(--pad-x) 56px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  max-width: 1100px;
}
.hero-content .eyebrow.light { color: rgba(250,243,225,0.92); text-shadow: 0 1px 8px rgba(0,0,0,0.5); }
.hero-big {
  font-family: var(--font-display);
  font-size: clamp(44px, 7vw, 104px);
  line-height: 0.94;
  letter-spacing: -0.025em;
  font-weight: 600;
  color: var(--paper);
  margin: 0;
  text-shadow: 0 2px 24px rgba(0,0,0,0.45);
}
.hero-big .serif-em { font-family: var(--font-display); font-style: italic; font-weight: 500; }
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.hero-btn-ghost {
  background: rgba(250,243,225,0.14);
  border: 1px solid rgba(250,243,225,0.5);
  color: var(--paper);
  backdrop-filter: blur(6px);
}
.hero-btn-ghost:hover { background: rgba(250,243,225,0.24); }

@media (max-width: 900px) {
  .heroPhoto { height: auto; min-height: 0; }
  .hero-photo-slot { position: relative; height: 56vh; }
  .hero-scrim { background: linear-gradient(0deg, rgba(20,16,12,0.6), rgba(20,16,12,0) 55%); }
  .hero-content { padding: 0 var(--pad-x) 32px; gap: 16px; }
}

/* ============ Collaborations ============ */
.collab-band { border-top: 1px solid var(--line-soft); }
.collab-grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 0;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
  background: var(--paper);
}
.collab-photo { position: relative; min-height: 420px; }
.collab-photo-slot { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
.collab-photo .badge {
  position: absolute;
  top: 18px; left: 18px;
  z-index: 2;
  background: var(--accent);
  color: var(--accent-ink);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 7px 12px;
  border-radius: 999px;
}
.collab-info { padding: 44px; display: flex; flex-direction: column; gap: 18px; }
.collab-info .partner { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
.collab-info h3 { font-family: var(--font-display); font-size: clamp(26px, 2.6vw, 36px); font-weight: 600; line-height: 1.05; letter-spacing: -0.015em; margin: 0; }
.collab-info p { font-size: 16px; line-height: 1.55; color: var(--ink-2); margin: 0; }
.collab-bottom { margin-top: auto; display: grid; grid-template-columns: auto 1fr; gap: 20px; align-items: center; padding-top: 22px; border-top: 1px solid var(--line-soft); }
.collab-qr-slot { display: block; width: 116px; height: 116px; }
.collab-qr-cap { font-family: var(--font-mono); font-size: 11px; line-height: 1.6; letter-spacing: 0.04em; color: var(--muted); text-transform: uppercase; }
.collab-qr-cap b { display: block; font-family: var(--font-sans); font-size: 14px; color: var(--ink); text-transform: none; letter-spacing: 0; font-weight: 600; margin-bottom: 4px; }

@media (max-width: 900px) {
  .collab-grid { grid-template-columns: 1fr; }
  .collab-photo { min-height: 280px; }
  .collab-photo-slot { position: relative; height: 280px; }
  .collab-info { padding: 28px; }
  .collab-bottom { grid-template-columns: 1fr; gap: 14px; }
}

/* ============ Home gallery (image slots) ============ */
.gallery-band { border-top: 1px solid var(--line-soft); }
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: 260px 260px;
  gap: 14px;
}
.g-slot { display: block; width: 100%; height: 100%; }
.g-tall { grid-row: 1 / 3; }
.g-wide { grid-column: 3 / 5; }
.caption-hint {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 16px 0 0;
}
.pdp-slot { display: block; width: min(420px, 80%); aspect-ratio: 3/4; }
.team-slot { display: block; width: 100%; aspect-ratio: 4/5; }

@media (max-width: 900px) {
  .gallery-grid { grid-template-columns: 1fr 1fr; grid-template-rows: 200px 200px 200px; }
  .g-tall { grid-row: auto; }
  .g-wide { grid-column: 1 / 3; }
}

/* ============ Home story band ============ */
.story-band { padding: 0; border-top: 1px solid var(--line-soft); }
.story-band-grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  min-height: 560px;
}
.story-band-left {
  padding: 80px var(--pad-x);
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.story-band-left h2 em { font-family: var(--font-display); font-style: italic; color: var(--accent); }
.body-band { font-size: 16px; line-height: 1.6; color: var(--ink-2); max-width: 52ch; margin: 0; }
.story-band-right {
  border-left: 1px solid var(--line-soft);
  position: relative;
  overflow: hidden;
  background: var(--paper);
}
.coastline { width: 100%; height: 100%; display: block; }

@media (max-width: 900px) {
  .story-band-grid { grid-template-columns: 1fr; min-height: 0; }
  .story-band-left { padding: 48px var(--pad-x); }
  .story-band-right { border-left: none; border-top: 1px solid var(--line-soft); min-height: 320px; }
}

/* ============ Header burger + mobile menu ============ */
.nav-links-desktop { display: flex; }
.nav-burger {
  display: none;
  width: 44px; height: 44px;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
}
.nav-burger span {
  display: block;
  width: 18px;
  height: 1.5px;
  background: var(--ink);
  border-radius: 999px;
  transition: transform .2s, opacity .15s;
}
.nav-burger.is-open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
.nav-burger.is-open span:nth-child(2) { opacity: 0; }
.nav-burger.is-open span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }

.mob-menu {
  position: fixed;
  inset: 0;
  background: rgba(20, 16, 12, 0.5);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.mob-menu.open { opacity: 1; pointer-events: auto; }
.mob-menu-panel {
  position: absolute;
  top: 64px;
  left: 0; right: 0;
  bottom: 0;
  background: var(--bg);
  padding: 24px 20px 32px;
  overflow-y: auto;
  transform: translateY(-12px);
  transition: transform .25s ease;
  display: flex;
  flex-direction: column;
  gap: 28px;
}
.mob-menu.open .mob-menu-panel { transform: translateY(0); }

.mob-links { display: flex; flex-direction: column; gap: 0;}
.mob-link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  color: var(--ink);
  padding: 16px 4px;
  border-bottom: 1px solid var(--line-soft);
  text-decoration: none;
  letter-spacing: -0.01em;
}
.mob-link.is-active { color: var(--accent); }
.mob-link .mob-arrow { font-family: var(--font-mono); font-size: 16px; color: var(--muted); }
.mob-link.is-active .mob-arrow { color: var(--accent); }

.mob-contact { display: flex; flex-direction: column; gap: 0; }
.mob-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.mob-cta-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--ink);
  text-decoration: none;
  margin-bottom: 8px;
}
.mob-cta-row:active { background: var(--paper); }

.nav-btn-label { display: inline; }
@media (max-width: 600px) {
  .nav-btn-label { display: none; }
}

.stm-cta {
  margin-top: 48px;
  padding: 28px;
  background: rgba(27,20,16,0.18);
  border-radius: var(--r-lg);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  align-items: center;
}
@media (max-width: 900px) {
  .stm-cta { grid-template-columns: 1fr; padding: 20px; }
}

/* ============ Responsive ============ */

  .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
}

  .heroA { padding: 36px var(--pad-x) 24px; }

  .heroA .bottom { grid-template-columns: 1fr; gap: 18px; padding-top: 22px; margin-top: 22px;}

  .h1 { font-size: clamp(36px, 9vw, 56px);}
  .h2 { font-size: clamp(24px, 6vw, 38px); }

  .strip { padding: 14px 0; font-size: 11px;}
  .strip-track { gap: 32px; }

  .catalog { padding: 24px var(--pad-x) 56px;}
  .catalog-head { gap: 14px; padding-bottom: 18px; margin-bottom: 18px; }
  .filters { gap: 4px; }

  .pdp-image { min-height: 420px; padding: 40px 20px; }
  .pdp-image .bag { width: min(260px, 70%); }
  .pdp-info { padding: 40px var(--pad-x); gap: 24px; }
  .pdp-info h1 { font-size: clamp(36px, 9vw, 56px);}

  .pdp-info .price-row .price { font-size: 26px;}
  .pdp-info .price-row > div:last-child { margin-left: 0; }
  .opts { gap: 4px; }
  .opt { font-size: 11px; padding: 7px 10px; }
  .profile-chart { grid-template-columns: 90px 1fr 36px; font-size: 10px; }

  .pdp-spec-table { font-size: 11px;}
  .pdp-spec-table td { padding: 10px 0; }

  .split, .split.thirds { grid-template-columns: 1fr; gap: 32px;}
  .story-grid { grid-template-columns: 1fr; gap: 36px;}
  .timeline-item { grid-template-columns: 60px 1fr; gap: 14px; padding-bottom: 16px;}
  .timeline-item .y { font-size: 12px; }
  .timeline-item .ev b { font-size: 16px;}

  .team-grid { grid-template-columns: 1fr 1fr; gap: 16px;}
  .team-card .ph { aspect-ratio: 3/4;}

  .contact-grid { grid-template-columns: 1fr; gap: 16px;}
  .contact-card { padding: 22px;}
  .contact-card h3 { font-size: 19px; }
  .contact-card .line { font-size: 12px; }
  .map-placeholder { aspect-ratio: 16/12; font-size: 10px; padding: 16px; text-align: center;}
  .map-canvas { aspect-ratio: 4/5;}
  .map-pin-wrap { top: 45%; left: 50%;}
  .map-pin-label { padding: 8px 10px;}
  .map-pin-label > div:nth-child(2) { font-size: 14px;}
  .map-cta { right: 10px; bottom: 10px; padding: 8px 11px;}
  .map-cta span:first-child { font-size: 10px;}

  .posts { grid-template-columns: 1fr; gap: 28px;}
  .post .tt { font-size: 21px;}

  .courses { grid-template-columns: 1fr; gap: 14px;}
  .course { padding: 20px;}
  .course .nm { font-size: 21px;}

  .checkout { grid-template-columns: 1fr; gap: 28px;}
  .summary-box { position: static; padding: 22px;}
  .field-row { grid-template-columns: 1fr; gap: 0;}
  .field input, .field textarea { font-size: 16px; padding: 11px;} /* avoid iOS zoom */

  .drawer { width: 100vw; }
  .drawer-head { padding: 16px 18px;}
  .drawer-body { padding: 12px 18px; }
  .drawer-foot { padding: 16px 18px;}
  .drawer-foot .total { font-size: 19px;}

  .footer { padding: 44px var(--pad-x) 20px;}
  .footer-grid { grid-template-columns: 1fr 1fr; gap: 24px; padding-bottom: 32px;}
  .footer-big { font-size: clamp(36px, 10vw, 56px); padding: 20px 0 6px;}
  .footer-bottom { flex-direction: column; gap: 6px;}

  .tweaks-toggle, .twk-toggle-btn { transform: scale(0.9); }
}

@media (max-width: 540px) {
  .footer-grid { grid-template-columns: 1fr; }
  .team-grid { grid-template-columns: 1fr;}
  .heroA .big { font-size: clamp(48px, 18vw, 80px);}
  .h1 { font-size: clamp(32px, 11vw, 48px);}
  .card-meta .row1 { flex-wrap: wrap; }
  .pdp-image { min-height: 360px;}
}

<script>// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)
/* BEGIN USAGE */
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped

 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')

 *                enters a reframe mode: the whole image spills past the mask

 *   placeholder  Empty-state caption.                      (default 'Drop an image')

 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"

  const STATE_FILE = '.image-slots.state.json';

    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView();
        this._applyView();
      }, { passive: false });
    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');
      }
      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);
      // width%/height% in _applyView encode the frame aspect at call time —
      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);
      load();
      this._render();
    }

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        // dragenter/leave fire for every descendant crossing — count depth
        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }
    }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();
</script>
